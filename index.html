<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="style.css">
    <script src = "js.js" defer></script>
</head>
<body>
    
    <main class = "main-wrapper">
        <div class ="btnContainer">
            <button class="button-74 Start" role="button">Start</button>
            <button class="button-74 Reset" role="button">Reset</button>
        </div>
        <article class = "game-container">
            <button data-id="0,0" class ="0,0 cell"></button>
            <button data-id="0,1"  class="0,1 cell"></button>
            <button data-id="0,2"  class="0,2 cell"></button>
            <button data-id="1,0"  class="1,0 cell"></button>
            <button data-id="1,1"  class="1,1 cell"></button>
            <button data-id="1,2"  class="1,2 cell"></button>
            <button data-id="2,0"  class="2,0 cell"></button>
            <button data-id="2,1"  class="2,1 cell"></button>
            <button data-id="2,2"  class="2,2 cell "></button>
            <p class = "gameInfo">Hello</p>
        </article>
        
    </main>

   

    
</body>
</html>
