<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="style.css">
    <script src = "js.js" defer></script>
</head>
<body>
    
    <main class = "main-wrapper">
        <article class = "game-container">
            <button class="0,0 cell">0,0</button>
            <button class="0,1 cell">0,1</button>
            <button class="0,2 cell">0,2</button>
            <button class="1,0 cell">1,0</button>
            <button class="1,1 cell">1,1</button>
            <button class="1,2 cell">1,2</button>
            <button class="2,0 cell">2,0</button>
            <button class="2,1 cell">2,1</button>
            <button class="2,2 cell ">2,2</button>
        </article>
    </main>

   

    
</body>
</html>
